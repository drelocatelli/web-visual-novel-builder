<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Fluxo de Visual Novel</title>
    <script type="module" src="app.js"></script>
    <style rel="stylesheet" crossorigin>@import "https://fonts.googleapis.com/css2?family=Open%20Sans:wght@400;500;700&display=swap";@import "https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined";body{background-color:#f0f3f6;margin:0;padding:0;font-family:Open Sans,sans-serif}#app{box-sizing:border-box;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;display:flex}#main-wrapper{box-sizing:border-box;background-color:#fff;border-radius:10px;width:55%;min-height:80%;margin:1rem 0;padding:2rem 3rem;box-shadow:1px 0 15px #e2e2e2}#main-wrapper h2{margin:0;padding:0}@media screen and (width<=900px){#main-wrapper{width:75%;padding:1.5rem 2rem}}@media screen and (width<=700px){#main-wrapper{width:95%;min-height:auto;margin:.5rem 0;padding:1rem}#main-wrapper h2{font-size:1.2rem}}#addBtn button#button label{padding:0}form{flex-flow:column wrap;align-items:flex-start;gap:5px;display:flex}form #imageUrl{flex-grow:1}@media screen and (width<=700px){form{flex-direction:column;gap:8px}form md-filled-button{align-self:flex-end}}fieldset{color:var(--primary-color);border:1px solid #e0e0e0;border-radius:10px;margin:0;font-size:13px;font-weight:700}@media screen and (width<=700px){fieldset legend{font-size:12px}}@media screen and (width<=700px){.canvas-wrapper canvas{height:180px}}@media screen and (width<=700px){.row{flex-direction:column}}textarea{box-sizing:border-box;resize:vertical;color:#333;background:#fafafa;border:2px solid #ddd;border-radius:8px;outline:none;width:100%;height:180px;margin-bottom:8px;padding:10px;font-family:monospace;font-size:12px;transition:border-color .2s}@media screen and (width<=700px){textarea{height:140px;font-size:11px}}message{font-size:12px;font-weight:700}message.error{color:red}#items-labels{flex-wrap:wrap;gap:5px;margin:1rem 0;display:flex}@media screen and (width<=700px){fieldset .row,fieldset>div{flex-direction:column;align-items:stretch!important}:is(fieldset .row,fieldset>div) md-outlined-select{width:100%}:is(fieldset .row,fieldset>div) span{align-self:center}:is(fieldset .row,fieldset>div)>div{justify-content:center;gap:8px;display:flex}}@media screen and (width<=700px){details{font-size:12px}}.canvas-wrapper{background:#fdfdfd;border:1px dashed #ccc;border-radius:10px;margin-bottom:14px;overflow-x:hidden}canvas#flow-canvas{cursor:grab;touch-action:none;min-width:100%;height:260px;display:block}canvas#flow-canvas:active{cursor:grabbing}#television-screen canvas#tv-canvas,#television-screen-loading canvas#tv-canvas{box-sizing:border-box;cursor:normal;height:100%;width:inherit;z-index:2;margin:0;padding:0;display:block;position:relative;overflow:hidden}#television-screen,#television-screen-loading{box-sizing:border-box;border:20px solid #532f2f;border-radius:20px;width:100%;height:500px;position:relative;overflow:hidden}:is(#television-screen,#television-screen-loading) #tv-content{z-index:3;box-sizing:border-box;flex-direction:column;width:100%;display:flex;position:absolute;bottom:0}:is(#television-screen,#television-screen-loading) #tv-content .closed{display:none}:is(#television-screen,#television-screen-loading) #tv-content .open{display:block}:is(#television-screen,#television-screen-loading) #tv-content .label{text-shadow:0 0 1px #000;background:#ffffffb6;border-top-left-radius:5px;border-top-right-radius:5px;align-self:flex-end;margin-right:1rem;padding:5px 1rem}:is(#television-screen,#television-screen-loading) #tv-content .summary{color:#fff;text-shadow:0 0 5px #000;box-sizing:border-box;background-color:#0000006e;width:100%;min-height:76px;max-height:300px;padding:1rem;overflow-y:auto}:is(#television-screen,#television-screen-loading) #tv-content .summary .option{box-sizing:border-box;text-align:start;cursor:pointer;color:#fff;background:0 0;border:none;width:100%;padding:.6rem 10px}:is(#television-screen,#television-screen-loading) #tv-content .summary .option:hover{text-shadow:0 0 5px #000;background-color:#0000006e}:is(#television-screen,#television-screen-loading) img.imgUrl{z-index:3;object-fit:cover;width:100%;height:100%;position:absolute;top:0;left:0}:root{--primary-color:#7272ff;--secondary-color:#cea9ff;--secondary-light-color:#a3a3ff;--btn-color:#fff;--btn-hover-color:#ddd;--md-ref-typeface-brand:"Open Sans";--md-ref-typeface-plain:"Open Sans";--md-sys-color-primary:var(--primary-color);--md-sys-color-secondary:var(--secondary-color);--md-sys-color-secondary-container:#ddd;--md-sys-color-shadow:transparent;--md-sys-border-start-start-radius:0;--md-sys-shape-corner-full:4px;--md-ripple-pressed-color:#fff;--md-ripple-hover-color:#fff;--ligth-color:#fff}md-filled-button,md-filled-tonal-button{--md-filled-button-elevation:0;--md-filled-tonal-button-elevation:0;--md-outlined-button-elevation:0;--md-filled-button-label-text-color:var(--btn-color);--md-filled-tonal-button-label-text-color:var(--btn-color);--md-outlined-button-label-text-color:var(--btn-color);--md-filled-button-hover-label-text-color:var(--btn-hover-color);--md-filled-tonal-button-hover-label-text-color:var(--btn-hover-color);--md-outlined-button-hover-label-text-color:var(--btn-hover-color);--md-filled-button-pressed-label-text-color:var(--btn-hover-color);--md-filled-tonal-button-pressed-label-text-color:var(--btn-hover-color);--md-outlined-button-pressed-label-text-color:var(--btn-hover-color);--md-filled-button-focus-label-text-color:var(--btn-color);--md-filled-tonal-button-focus-label-text-color:var(--btn-color);--md-outlined-button-focus-label-text-color:var(--btn-color);--_focus-label-text-color:var(--btn-color);padding:0 12px}md-outlined-button{--md-sys-shape-corner-full:20px}md-outlined-text-field.minimal{--md-outlined-text-field-leading-space:10px;--md-outlined-text-field-trailing-space:10px;--md-outlined-text-field-top-space:6px;--md-outlined-text-field-bottom-space:6px}md-outlined-select{--md-outlined-select-text-field-leading-space:0px;--md-menu-item-selected-container-color:var(--secondary-light-color)}md-outlined-select::part(menu){--md-menu-container-shape:0px;--md-menu-top-space:0px}md-outlined-select{font-size:13px;--md-outlined-field-container-height:59px!important;--md-outlined-field-top-space:8px!important;--md-outlined-field-bottom-space:8px!important}#television-container{width:100%;height:500px;margin:0 auto;position:relative}#tv-frame{z-index:1;position:relative}#screen-content{z-index:5;z-index:2;background-color:#00f;border-radius:10px;width:45%;height:68%;position:absolute;top:9%;left:21%;overflow:hidden}#screen-content visual{width:100%;height:100%;display:block}#frame{box-sizing:border-box;background-color:#00f;border-radius:5px;width:100%;height:500px;margin:0 auto;position:relative}
/*$vite$:1*/</style>
  </head>
  <body>
    <div id="app" v-scope>
      <div id="main-wrapper">
        <div id="card">
          <h2 style="color: var(--primary-color); margin-bottom: 1rem">Fluxo Visual Novel</h2>
          <fieldset>
            <legend>Adicionar nó</legend>
            <div class="row">
              <form method="post" @submit.prevent="Form.add($event.target)" @vue:mounted="Form.loadFlow">
                <div class="row" style="display: flex; align-items: flex-start; width: 100%; box-sizing: border-box; gap: 5px;">
                  <md-outlined-text-field
                    id="title"
                    class="minimal"
                    label="Título"
                    maxLength="30"
                    :value="Form.form.label"
                    @input="Form.form.label = $event.target.value"
                    @blur="Form.generateId"
                    name="label"
                    required
                   
                  ></md-outlined-text-field>
  
                  <md-outlined-text-field
                    style="flex-grow: 1;"
                    id="imageUrl"
                    class="minimal"
                    label="Url de imagem"
                    :value="Form.form.imageUrl ?? ''"
                    name="imageUrl"
                  ></md-outlined-text-field>
  
                  <md-outlined-text-field
                    name="id"
                    class="minimal"
                    label="Identificador"
                    :value="Form.form.id || ''"
                    required
                     readOnly
                  ></md-outlined-text-field>
                </div>
                
                <div class="row" style="display: flex; gap: 4px; align-items: flex-start; width: 100%; box-sizing: border-box;">
                  <md-outlined-text-field
                  name="text"
                  label="Texto"
                  class="minimal"
                  maxLength="120"
                  :value="Form.form.text || ''"
                  style="flex-grow: 1;"
                  required
                  ></md-outlined-text-field>
                  
                  <md-filled-button type="submit">
                      <md-icon style="width: 8px; height: 8px">add</md-icon>
                      Adicionar
                  </md-filled-button>
                </div>
              </form>
          </fieldset>

          <fieldset style="margin-top: 1rem">
            <legend>Conectar / Desconectar nós</legend>
            <div style="display: flex; align-items: center; gap: 1rem; color: #333">
              <md-outlined-select id="select-from" :disabled="Form.flow.length <= 1" :value="Form.connectFrom" @change="Form.connectFrom = $event.target.value">
                <md-select-option value="" selected>
                  <div slot="headline">Origem</div>
                </md-select-option>
                <md-select-option v-for="node in Form.flow" :value="node.id">{{ node.id }}</md-select-option>
              </md-outlined-select>
              <span> → </span>
              <md-outlined-select id="select-to" :disabled="Form.flow.length <= 1" :value="Form.connectTo" @change="Form.connectTo = $event.target.value">
                <md-select-option value="" selected>
                  <div slot="headline">Destino</div>
                </md-select-option>
                <md-select-option v-for="node in Form.flow" :value="node.id">{{ node.id }}</md-select-option>
              </md-outlined-select>

              <div>
                <md-filled-button @click="Form.connect()">Conectar</md-filled-button>
                <md-filled-button @click="Form.disconnect()" style="--md-sys-color-primary: rgb(255, 75, 75); --md-filled-button-hover-label-text-color: #fff;">Desconectar</md-filled-button>
              </div>
            </div>
          </fieldset>
        </div>

        <div v-show="Form.flow.length > 0">
          <div class="row" style="margin-top: 1rem">
            <div id="items-labels">
              <md-outlined-button
                :data-nodeId="node.id"
                @click="Form.removeUniqueElementFromNode(node.id)"
                style="--md-outlined-button-label-text-color: red; --md-outlined-button-outline-color: red; --md-outlined-button-hover-label-text-color: red; padding: 3px 16px; font-size: 10px; --md-elevated-button-container-color: green;"
                v-for="node in Form.flow"
              >
                <md-icon style="width: 8px; height: 8px">close</md-icon>
                {{node.id}}
              </md-outlined-button>
            </div>

            <div class="canvas-wrapper">
              <canvas id="flow-canvas" width="2000" height="520"></canvas>
              <div style="text-align: center; color: #999; font-size: 12px; padding: 6px;">🔍 Scroll para zoom · Arraste para mover</div>
            </div>

            <details open>
              <summary>Resultados</summary>
              <div id="television">
                  <b>Visualização do fluxo</b>
                  <div id="television-screen" class="visual" :class="store.loading ? 'closed' : 'open'">
                    <img :src="Visual.current ? Visual.current.imageUrl : ''" class="imgUrl" :alt="Visual.current ? Visual.current.id : ''" style="pointer-events: none;" v-show="!store.loading && Visual.current && Visual.current.imageUrl">
                    <canvas id="tv-canvas" width="640" height="800" style="width: 100%;"></canvas>
                    <div id="tv-content" :class="store.loading ? 'closed' : 'open'" v-show="!store.loading">
                      <div class="summary" v-if="Visual.current">
                        <div class="text">
                            {{Visual.current?.label}}
                        </div>
                        <div class="options">
                          <button class="option" v-for="option in Visual.getOptions(Visual.current)" @click="Visual.setOption(option.id)">
                            {{ option.text }}
                          </button>
                        </div>
                      </div>
                    </div>
                </div>
              </div>

              <div> 
                <div id="json">
                  <b>JSON (editável)</b>
                  <textarea name="flowContent" id="flowContent" :value="Form.getFlow" @input="Form.updateFlow($event.target.value)"></textarea>
                  <message v-if="Form.message.text" v-html="Form.message.text" :class="Form.message.status"></message>
                  <div style="display: flex; flex-direction: row; justify-content: flex-end">
                    <md-filled-tonal-button style="--md-sys-color-secondary-container: purple" @click="Form.saveJson">
                      Salvar JSON
                    </md-filled-tonal-button>
                  </div>
                </div>
              </div>
            </details>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
